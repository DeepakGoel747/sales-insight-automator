version: "3.9"

# ─────────────────────────────────────────────────────────────
# Sales Insight Automator — Full Stack Compose
# Usage: docker compose up --build
# ─────────────────────────────────────────────────────────────

services:
  # ── Backend (FastAPI) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: rabbitt/sales-insight-backend:latest
    container_name: sia-backend
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SENDER_NAME=${SENDER_NAME:-Rabbitt AI Sales Insights}
      - APP_API_KEY=${APP_API_KEY:-rabbitt-dev-key-change-in-prod}
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://frontend
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
    ports:
      - "8000:8000"
    networks:
      - sia-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    # Resource limits — prevent runaway containers
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  # ── Frontend (nginx SPA) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rabbitt/sales-insight-frontend:latest
    container_name: sia-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sia-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

# ── Network ─────────────────────────────────────────────────
networks:
  sia-net:
    driver: bridge
    name: sia-network
