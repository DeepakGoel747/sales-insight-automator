name: CI — Build, Lint & Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/sia-backend
  IMAGE_FRONTEND: ${{ github.repository }}/sia-frontend

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Lint & Type-check Backend
  # ─────────────────────────────────────────────────────────
  lint-backend:
    name: 🐍 Lint Backend (Ruff + Pyright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pyright

      - name: Ruff lint
        run: ruff check main.py --output-format=github

      - name: Ruff format check
        run: ruff format --check main.py

  # ─────────────────────────────────────────────────────────
  # Job 2: Security Scan (Bandit)
  # ─────────────────────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan (Bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r main.py -ll --exit-zero

  # ─────────────────────────────────────────────────────────
  # Job 3: Build & Validate Docker Images
  # ─────────────────────────────────────────────────────────
  build-images:
    name: 🐳 Docker Build (Backend + Frontend)
    runs-on: ubuntu-latest
    needs: [lint-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: false
          tags: ${{ env.IMAGE_BACKEND }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_FRONTEND }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────
  # Job 4: Integration Smoke Test
  # ─────────────────────────────────────────────────────────
  smoke-test:
    name: 🧪 Smoke Test (docker-compose up)
    runs-on: ubuntu-latest
    needs: [build-images]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          GEMINI_API_KEY=mock-key-for-ci
          SMTP_USER=
          SMTP_PASS=
          APP_API_KEY=rabbitt-ci-test-key
          EOF

      - name: Start stack
        run: docker compose up -d --build
        timeout-minutes: 5

      - name: Wait for backend health
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health; then
              echo "Backend healthy ✅"
              break
            fi
            echo "Attempt $i — retrying in 3s"
            sleep 3
          done

      - name: Verify OpenAPI spec is accessible
        run: curl -sf http://localhost:8000/openapi.json | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['info']['title'] == 'Sales Insight Automator'"

      - name: Verify frontend loads
        run: curl -sf http://localhost:80 | grep -q "Rabbitt"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Teardown
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────────────────
  # Job 5: Push to GHCR (only on merge to main)
  # ─────────────────────────────────────────────────────────
  publish:
    name: 📦 Publish to GHCR
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
